    // 4-day rotation: Back → Shoulders → Legs → Chest (Sunday always rest)
    const rotationOrder = ['back', 'shoulders', 'legs', 'chest'];
    
    // Calculate which workout for a given week and day
    function getWorkoutForDay(weekNumber, dayOfWeek) {
      if (dayOfWeek === 0) return 'rest'; // Sunday always rest
      
      // Calculate total training days before this week
      // Each week has 6 training days (Mon-Sat)
      const trainingDaysBefore = (weekNumber - 1) * 6;
      
      // Day index within the week (Mon=0, Tue=1, ... Sat=5)
      const dayIndex = dayOfWeek - 1;
      
      // Total training day number
      const totalTrainingDay = trainingDaysBefore + dayIndex;
      
      // Get rotation index (0-3)
      const rotationIndex = totalTrainingDay % 4;
      
      return rotationOrder[rotationIndex];
    }

      const [selectedDayOfWeek, setSelectedDayOfWeek] = useState(new Date().getDay());

      const [timerSeconds, setTimerSeconds] = useState(90);
      const [showModal, setShowModal] = useState(null);

      const currentSessionKey = getWorkoutForDay(currentWeek, selectedDayOfWeek);
      const currentSession = sessions[currentSessionKey];
      const completedCount = currentSession.exercises.filter(e => e.done).length;
      const totalVolume = currentSession.exercises.reduce((sum, e) => {
        const w = typeof e.weight === 'number' ? e.weight : 0;
        return sum + (e.sets * e.reps * w);
      }, 0);

      // Generate week schedule
      const weekSchedule = [0,1,2,3,4,5,6].map(d => ({
        day: d,
        name: dayNames[d],
        workout: getWorkoutForDay(currentWeek, d),
        isToday: d === new Date().getDay()
      }));

      // Reorder to start with Monday
      const orderedSchedule = [...weekSchedule.slice(1), weekSchedule[0]];

      useEffect(() => {
        let interval;
        if (restTimer !== null && timerSeconds > 0) {
          interval = setInterval(() => setTimerSeconds(s => s - 1), 1000);
        } else if (timerSeconds === 0) {
          if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
          setRestTimer(null);
          setTimerSeconds(90);
        }
        return () => clearInterval(interval);
      }, [restTimer, timerSeconds]);

      const toggleExercise = (sessionKey, id) => {
        setSessions(prev => ({
          ...prev,
          [sessionKey]: {
            ...prev[sessionKey],
            exercises: prev[sessionKey].exercises.map(ex =>
              ex.id === id ? { ...ex, done: !ex.done } : ex
            )
          }

          setRestTimer(Date.now());
          setTimerSeconds(90);

        protein: acc.protein + m.protein,
        carbs: acc.carbs + m.carbs,
        fats: acc.fats + m.fats

        progressFill: (pct) => ({ height: '100%', background: 'linear-gradient(to right, #B45309, #D4A84B)', width: `${pct}%`, transition: 'width 0.3s' }),
        chartContainer: { background: '#18181b', borderRadius: 12, padding: 16, border: '1px solid #27272a', marginBottom: 16 },
        chartHeader: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 },
        chartBars: { height: 128, display: 'flex', alignItems: 'flex-end', gap: 4 },
        chartBar: (h) => ({ flex: 1, background: 'linear-gradient(to top, #B45309, #D4A84B)', borderRadius: '4px 4px 0 0', height: `${h}%`, minHeight: 8 }),
        chartLabel: { fontSize: 8, color: '#52525b', marginTop: 4, textAlign: 'center' },
        measureGrid: { display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 16 },
        measureCard: { background: '#18181b', borderRadius: 12, padding: 12, border: '1px solid #27272a' },
        measureLabel: { fontSize: 10, color: '#71717a', textTransform: 'uppercase' },
        measureValue: { fontSize: 18, fontWeight: 700, marginTop: 2 },
        measureUnit: { fontSize: 12, color: '#D4A84B', marginLeft: 2 },
        photoGrid: { display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 },
        photoCard: { aspectRatio: '3/4', background: '#18181b', borderRadius: 12, overflow: 'hidden', position: 'relative', border: '1px solid #27272a' },
        photoImg: { width: '100%', height: '100%', objectFit: 'cover' },
        photoDate: { position: 'absolute', bottom: 0, left: 0, right: 0, background: 'linear-gradient(transparent, rgba(0,0,0,0.9))', padding: 12 },
        photoDateText: { fontSize: 12, color: '#a1a1aa' },
        uploadBtn: { aspectRatio: '3/4', background: '#18181b', borderRadius: 12, border: '2px dashed #3f3f46', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' },
        emptyState: { textAlign: 'center', padding: '64px 0', color: '#71717a' },
        emptyIcon: { fontSize: 48, marginBottom: 16 },
        restDay: { textAlign: 'center', padding: '48px 0', color: '#71717a' },
        completedBadge: { textAlign: 'right' },
        completedValue: { fontSize: 24, fontWeight: 700, color: '#D4A84B' },
        completedLabel: { fontSize: 10, color: '#71717a', textTransform: 'uppercase' }
      };

      return (
        <div style={styles.app}>
          {/* Header */}
          <header style={styles.header}>
            <div style={styles.headerInner}>
              <div style={styles.logo}>
                {Icons.trophy}
                <span style={styles.logoText}>OLYMPIA FORGE</span>
              </div>
              <div style={styles.streak}>
                {Icons.fire} {streak}
              </div>
            </div>
          </header>

          {/* Rest Timer Overlay */}
          {restTimer && (
            <div style={styles.timerOverlay} onClick={() => { setRestTimer(null); setTimerSeconds(90); }}>
              <div style={styles.timerLabel}>REST TIMER</div>
              <div style={styles.timerText}>
                {Math.floor(timerSeconds / 60)}:{String(timerSeconds % 60).padStart(2, '0')}
              </div>
              <div style={styles.timerHint}>Tap anywhere to dismiss</div>
              <div style={styles.timerBtns}>
                {[60, 90, 120].map(t => (
                  <button key={t} style={styles.timerPreset(timerSeconds === t)} onClick={(e) => { e.stopPropagation(); setTimerSeconds(t); }}>
                    {t}s
                  </button>
                ))}
              </div>
            </div>
          )}

          <main style={styles.main}>
            {/* Workout View */}
            {view === 'workout' && (
              <>
                {/* Week navigation */}
                <div style={styles.weekNav}>
                  <button style={styles.weekBtn} onClick={() => setCurrentWeek(w => Math.max(1, w - 1))}>←</button>
                  <span style={styles.weekLabel}>Week {currentWeek}</span>
                  <button style={styles.weekBtn} onClick={() => setCurrentWeek(w => w + 1)}>→</button>
                </div>

                {/* Day selector */}
                <div style={styles.dayScroll} className="scrollbar-hide">
                  {orderedSchedule.map(d => {
                    const session = sessions[d.workout];
                    const isRest = d.workout === 'rest';
                    const active = selectedDayOfWeek === d.day;
                    return (
                      <button key={d.day} style={styles.dayBtn(active, isRest)} onClick={() => setSelectedDayOfWeek(d.day)}>
                        <span style={styles.dayLabel}>{d.name}</span>
                        <span style={styles.dayWorkout}>{session.shortName}</span>
                        {d.isToday && <div style={styles.todayDot} />}
                      </button>
                    );
                  })}
                </div>

                {/* Session header */}
                <div style={styles.sessionHeader}>
                  <div>
                    <h2 style={styles.sessionTitle}>{currentSession.name}</h2>
                    <div>
                      {currentSession.muscles.map(m => (
                        <span key={m} style={styles.muscleTag}>{m}</span>
                      ))}
                    </div>
                  </div>
                  <div style={styles.completedBadge}>
                    <div style={styles.completedValue}>{completedCount}/{currentSession.exercises.length}</div>
                    <div style={styles.completedLabel}>Done</div>
                  </div>
                </div>

                {/* Quick stats */}
                <div style={styles.statsGrid}>
                  <div style={styles.statCard}>
                    <div style={styles.statValue}>{Math.round(totalVolume / 1000)}k</div>
                    <div style={styles.statLabel}>Volume</div>
                  </div>
                  <div style={styles.statCard}>
                    <div style={styles.statValue}>{currentSession.exercises.length}</div>
                    <div style={styles.statLabel}>Exercises</div>
                  </div>
                  <div style={{...styles.statCard, ...styles.timerBtn}} onClick={() => { setRestTimer(Date.now()); setTimerSeconds(90); }}>
                    <div style={{...styles.statValue, color: '#D4A84B'}}>1:30</div>
                    <div style={{...styles.statLabel, color: 'rgba(212,168,75,0.7)'}}>Timer</div>
                  </div>
                </div>

                {/* Exercise list */}
                {currentSession.exercises.length > 0 ? (
                  currentSession.exercises.map((ex, idx) => (
                    <div key={ex.id} style={styles.exerciseCard(ex.done)}>
                      <div style={styles.exerciseInner}>
                        <div style={styles.checkBtn(ex.done)} onClick={() => toggleExercise(currentSessionKey, ex.id)}>
                          {ex.done ? Icons.check : <span style={{color: '#71717a', fontSize: 14}}>{idx + 1}</span>}
                        </div>
                        <div style={{flex: 1, minWidth: 0}}>
                          <h3 style={styles.exerciseName(ex.done)}>{ex.name}</h3>
                          <div style={styles.exerciseMeta}>
                            <span style={styles.exerciseMetaItem}>{ex.sets} sets</span>
                            <span style={styles.exerciseMetaItem}>{ex.reps} reps</span>
                            <span style={styles.exerciseWeight}>{ex.weight}{typeof ex.weight === 'number' ? 'kg' : ''}</span>
                          </div>
                        </div>
                        <div style={styles.editBtn} onClick={() => { setEditingExercise({...ex, sessionKey: currentSessionKey}); setShowModal('edit'); }}>
                          {Icons.edit}
                        </div>
                      </div>
                    </div>
                  ))
                ) : (
                  <div style={styles.restDay}>
                    <div style={{fontSize: 48, marginBottom: 8}}>🏖️</div>
                    <p>Rest day — recover and grow!</p>
                  </div>
                )}
              </>
            )}

            {/* Nutrition View */}
            {view === 'nutrition' && (
              <>
                <div style={styles.macroGrid}>
                  {[
                    { label: 'Calories', value: Math.round(totalNutrition.calories), color: '#D4A84B' },
                    { label: 'Protein', value: `${Math.round(totalNutrition.protein)}g`, color: '#f87171' },
                    { label: 'Carbs', value: `${Math.round(totalNutrition.carbs)}g`, color: '#60a5fa' },
                    { label: 'Fats', value: `${Math.round(totalNutrition.fats)}g`, color: '#4ade80' },
                  ].map((s, i) => (
                    <div key={i} style={styles.macroCard()}>
                      <div style={styles.macroValue(s.color)}>{s.value}</div>
                      <div style={styles.statLabel}>{s.label}</div>
                    </div>
                  ))}
                </div>

                <div style={styles.chartContainer}>
                  <div style={styles.chartHeader}>
                    <span style={{fontSize: 14, color: '#a1a1aa'}}>Meals completed</span>
                    <span style={{fontWeight: 700, color: '#D4A84B'}}>{mealsCompleted}/{nutritionPlan.length}</span>
                  </div>
                  <div style={styles.progressBar}>
                    <div style={styles.progressFill((mealsCompleted / nutritionPlan.length) * 100)} />
                  </div>
                </div>

                {nutritionPlan.map((meal, idx) => (
                  <div key={idx} style={styles.mealCard(mealChecks[idx])} onClick={() => setMealChecks(p => ({...p, [idx]: !p[idx]}))}>
                    <div style={styles.mealInner}>
                      <div style={styles.mealCheck(mealChecks[idx])}>
                        {mealChecks[idx] ? Icons.check : <span style={{fontSize: 10, color: '#71717a'}}>{meal.meal}</span>}
                      </div>
                      <div style={{flex: 1}}>
                        <div style={styles.mealName(mealChecks[idx])}>{meal.meal} • {meal.time}</div>
                        <div style={styles.mealItems(mealChecks[idx])}>{meal.items.join(', ')}</div>
                        <div style={styles.mealMacros}>
                          <span style={styles.mealMacro('#D4A84B')}>{Math.round(meal.calories)} cal</span>
                          <span style={styles.mealMacro('#f87171')}>{Math.round(meal.protein)}g P</span>
                          <span style={styles.mealMacro('#60a5fa')}>{Math.round(meal.carbs)}g C</span>
                          <span style={styles.mealMacro('#4ade80')}>{Math.round(meal.fats)}g F</span>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </>
            )}

            {/* Body View */}
            {view === 'body' && (
              <>
                <div style={styles.chartContainer}>
                  <div style={styles.chartHeader}>
                    <span style={{fontWeight: 500}}>Weight Progress</span>
                    <span style={{fontWeight: 700, color: '#D4A84B'}}>{stats.weight} kg</span>
                  </div>
                  <div style={styles.chartBars}>
                    {weightHistory.map((d, i) => (
                      <div key={i} style={{flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center'}}>
                        <div style={styles.chartBar(((d.weight - 78) / 8) * 100)} />
                        <span style={styles.chartLabel}>{d.date}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={styles.measureGrid}>
                  {[
                    { label: 'Weight', value: stats.weight, unit: 'kg' },
                    { label: 'Body Fat', value: stats.bodyFat, unit: '%' },
                    { label: 'Chest', value: stats.chest, unit: 'cm' },
                    { label: 'Waist', value: stats.waist, unit: 'cm' },
                    { label: 'Shoulders', value: stats.shoulders, unit: 'cm' },
                    { label: 'Biceps', value: stats.biceps, unit: 'cm' },
                    { label: 'Upper Leg', value: stats.upperLeg, unit: 'cm' },
                    { label: 'Calves', value: stats.calves, unit: 'cm' },
                    { label: 'Neck', value: stats.neck, unit: 'cm' },
                  ].map((m, i) => (
                    <div key={i} style={styles.measureCard}>
                      <div style={styles.measureLabel}>{m.label}</div>
                      <div style={styles.measureValue}>{m.value}<span style={styles.measureUnit}>{m.unit}</span></div>
                    </div>
                  ))}
                </div>

                <button style={styles.saveBtn} onClick={() => setShowModal('stats')}>Update Measurements</button>
              </>
            )}

            {/* Photos View */}
            {view === 'photos' && (
              <>
                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16}}>
                  <h2 style={{fontSize: 18, fontWeight: 700}}>Progress Photos</h2>
                  <label style={{...styles.saveBtn, padding: '8px 16px', fontSize: 14}}>
                    + Add
                    <input type="file" accept="image/*" onChange={handlePhotoUpload} style={{display: 'none'}} />
                  </label>
                </div>

                {photos.length > 0 ? (
                  <div style={styles.photoGrid}>
                    {photos.map((p, i) => (
                      <div key={i} style={styles.photoCard}>
                        <img src={p.url} alt="Progress" style={styles.photoImg} />
                        <div style={styles.photoDate}><span style={styles.photoDateText}>{p.date}</span></div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div style={styles.emptyState}>
                    <div style={styles.emptyIcon}>📸</div>
                    <p>Track your transformation</p>
                    <p style={{fontSize: 14, marginTop: 4}}>Upload front, side, back poses</p>
                    <label style={{...styles.saveBtn, display: 'inline-block', marginTop: 16, padding: '12px 24px', background: '#27272a', color: '#d4d4d8'}}>
                      Upload first photo
                      <input type="file" accept="image/*" onChange={handlePhotoUpload} style={{display: 'none'}} />
                    </label>
                  </div>
                )}
              </>
            )}
          </main>

          {/* Bottom Nav */}
          <nav style={styles.nav}>
            <div style={styles.navInner}>
              {[
                { id: 'workout', icon: Icons.dumbbell, label: 'Workout' },
                { id: 'nutrition', icon: Icons.utensils, label: 'Nutrition' },
                { id: 'body', icon: Icons.ruler, label: 'Body' },
                { id: 'photos', icon: Icons.camera, label: 'Photos' },
              ].map(tab => (
                <button key={tab.id} style={styles.navBtn(view === tab.id)} onClick={() => setView(tab.id)}>
                  {tab.icon}
                  <span style={styles.navLabel}>{tab.label}</span>
                </button>
              ))}
            </div>
          </nav>

          {/* Edit Modal */}
          {showModal === 'edit' && editingExercise && (
            <div style={styles.modalOverlay} onClick={() => setShowModal(null)}>
              <div style={styles.modalContent} onClick={e => e.stopPropagation()}>
                <div style={styles.modalHandle} />
                <h3 style={styles.modalTitle}>{editingExercise.name}</h3>
                <div style={styles.inputGrid}>
                  <div>
                    <label style={styles.inputLabel}>Sets</label>
                    <input type="number" value={editingExercise.sets} onChange={e => setEditingExercise(p => ({...p, sets: +e.target.value || 0}))} style={styles.input} />
                  </div>
                  <div>
                    <label style={styles.inputLabel}>Reps</label>
                    <input type="number" value={editingExercise.reps} onChange={e => setEditingExercise(p => ({...p, reps: +e.target.value || 0}))} style={styles.input} />
                  </div>
                  <div>
                    <label style={styles.inputLabel}>Weight</label>
                    <input type="text" value={editingExercise.weight} onChange={e => setEditingExercise(p => ({...p, weight: e.target.value}))} style={styles.input} />
                  </div>
                </div>
                <button style={styles.saveBtn} onClick={() => {
                  setSessions(prev => ({
                    ...prev,
                    [editingExercise.sessionKey]: {
                      ...prev[editingExercise.sessionKey],
                      exercises: prev[editingExercise.sessionKey].exercises.map(ex =>
                        ex.id === editingExercise.id ? {...ex, sets: editingExercise.sets, reps: editingExercise.reps, weight: isNaN(editingExercise.weight) ? editingExercise.weight : +editingExercise.weight} : ex
                      )
                    }
                  }));
                  setShowModal(null);
                }}>Save Changes</button>
              </div>
            </div>
          )}

          {/* Stats Modal */}
          {showModal === 'stats' && (
            <div style={styles.modalOverlay} onClick={() => setShowModal(null)}>
              <div style={{...styles.modalContent, maxHeight: '80vh', overflow: 'auto'}} onClick={e => e.stopPropagation()}>
                <div style={styles.modalHandle} />
                <h3 style={styles.modalTitle}>Update Measurements</h3>
                <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 24}}>
                  {Object.entries(stats).map(([key, value]) => (
                    <div key={key}>
                      <label style={styles.inputLabel}>{key.replace(/([A-Z])/g, ' $1')}</label>
                      <input type="number" step="0.1" value={value} onChange={e => setStats(p => ({...p, [key]: +e.target.value || 0}))} style={{...styles.input, textAlign: 'left', padding: '12px'}} />
                    </div>
                  ))}
                </div>
                <button style={styles.saveBtn} onClick={() => setShowModal(null)}>Save Measurements</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
